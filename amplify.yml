version: 1

frontend:
  phases:
    preBuild:
      commands:
        - nvm install 22
        - nvm use 22
        - node -v
        - npm ci

    build:
      commands:
        - rm -f .env.production

        - 'if [ -z "$WP_API_URL" ]; then echo "WP_API_URL missing"; exit 1; fi'
        - 'if [ -z "$NEXT_PUBLIC_WP_URL" ]; then echo "NEXT_PUBLIC_WP_URL missing"; exit 1; fi'
        - 'if [ -z "$WC_KEY" ]; then echo "WC_KEY missing"; exit 1; fi'
        - 'if [ -z "$WC_SECRET" ]; then echo "WC_SECRET missing"; exit 1; fi'
        - 'if [ -z "$STRIPE_SECRET_KEY" ]; then echo "STRIPE_SECRET_KEY missing"; exit 1; fi'
        - 'if [ -z "$NEXT_PUBLIC_SITE_URL" ]; then echo "NEXT_PUBLIC_SITE_URL missing"; exit 1; fi'
        - 'if [ -z "$CMS_COOKING_API_BASE_URL" ]; then echo "CMS_COOKING_API_BASE_URL missing"; exit 1; fi'
        - 'if [ -z "$CMS_COOKING_API_CLIENT_ID" ]; then echo "CMS_COOKING_API_CLIENT_ID missing"; exit 1; fi'
        - 'if [ -z "$CMS_COOKING_API_KEY" ]; then echo "CMS_COOKING_API_KEY missing"; exit 1; fi'

        - echo "All required environment variables are present"

        - echo "WP_API_URL=$WP_API_URL" >> .env.production
        - echo "NEXT_PUBLIC_WP_URL=$NEXT_PUBLIC_WP_URL" >> .env.production
        - echo "WC_KEY=$WC_KEY" >> .env.production
        - echo "WC_SECRET=$WC_SECRET" >> .env.production
        - echo "STRIPE_SECRET_KEY=$STRIPE_SECRET_KEY" >> .env.production
        - echo "NEXT_PUBLIC_SITE_URL=$NEXT_PUBLIC_SITE_URL" >> .env.production
        - echo "CMS_COOKING_API_BASE_URL=$CMS_COOKING_API_BASE_URL" >> .env.production
        - echo "CMS_COOKING_API_CLIENT_ID=$CMS_COOKING_API_CLIENT_ID" >> .env.production
        - echo "CMS_COOKING_API_KEY=$CMS_COOKING_API_KEY" >> .env.production

        - npm run build -- --webpack

  artifacts:
    baseDirectory: .next
    files:
      - '**/*'

  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*